name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Verify tag matches package.json
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          if [ "${PKG_VERSION}" != "${{ steps.version.outputs.version }}" ]; then
            echo "::error::tag ${{ steps.version.outputs.tag }} does not match package.json version ${PKG_VERSION}"
            exit 1
          fi

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Extract release notes from CHANGELOG.md
        id: notes
        # `pnpm --silent` drops the script banner from stdout so only the
        # extractor's own output lands in release-notes.md. Same script
        # as `pnpm release:notes <version>` locally.
        run: |
          pnpm --silent release:notes "${{ steps.version.outputs.version }}" > release-notes.md
          echo "Release notes preview:"
          echo "----------------------"
          cat release-notes.md
          echo "----------------------"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body_path: release-notes.md
          draft: false
          prerelease: false
